<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Browser</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>File Browser</h1>
      <p id="currentPath">/</p>
    </header>

    <section class="actions">
      <button id="upBtn" type="button">Up</button>
      <button id="refreshBtn" type="button">Refresh</button>
      <input id="newDirName" type="text" placeholder="New folder name">
      <button id="createDirBtn" type="button">Create Folder</button>
      <input id="uploadInput" type="file">
    </section>

    <section>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Size</th>
            <th>Modified</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="fileTableBody"></tbody>
      </table>
    </section>

    <section class="preview">
      <h2>Preview</h2>
      <pre id="textPreview" hidden></pre>
      <img id="imagePreview" alt="Image preview" hidden>
      <p id="emptyPreview">Select a text file or image to preview.</p>
    </section>

    <p id="status"></p>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
